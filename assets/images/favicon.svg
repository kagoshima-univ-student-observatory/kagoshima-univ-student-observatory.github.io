<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0f2d5d" />
  <!-- 星をつなぐ線 -->
  <polyline points="25,25 45,45 65,40 80,75" fill="none" stroke="#6b8cc7" stroke-width="3" />
  <line x1="45" y1="45" x2="35" y2="75" stroke="#6b8cc7" stroke-width="3" />
  <!-- 星（大・中・小） -->
  <circle cx="25" cy="25" r="7" fill="#ffffff" />
  <circle cx="45" cy="45" r="4" fill="#fbd38d" />
  <circle cx="65" cy="40" r="5" fill="#ffffff" />
  <circle cx="80" cy="75" r="8" fill="#ffffff" />
  <circle cx="35" cy="75" r="5" fill="#fbd38d" />
</svg>
